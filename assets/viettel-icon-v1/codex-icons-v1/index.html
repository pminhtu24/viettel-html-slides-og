<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viettel SVG Icon Library</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: "FS Magistral", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #ffffff, var(--bg));
    }
    h1 { margin: 0 0 6px; }
    p { margin: 0 0 20px; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }
    .item {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .item img { width: 64px; height: 64px; display: block; }
    .name { font-size: 13px; font-weight: 600; text-align: center; }
  </style>
</head>
<body>
  <h1>Viettel SVG Icon Library</h1>
  <p>Hand-drawn circular icons for slide assets.</p>
  <div class="grid">
    <div class="item"><img src="analytics.svg" alt="analytics" /><div class="name">analytics</div></div>
    <div class="item"><img src="api.svg" alt="api" /><div class="name">api</div></div>
    <div class="item"><img src="automation.svg" alt="automation" /><div class="name">automation</div></div>
    <div class="item"><img src="cloud.svg" alt="cloud" /><div class="name">cloud</div></div>
    <div class="item"><img src="compliance.svg" alt="compliance" /><div class="name">compliance</div></div>
    <div class="item"><img src="cost.svg" alt="cost" /><div class="name">cost</div></div>
    <div class="item"><img src="data-pipeline.svg" alt="data-pipeline" /><div class="name">data-pipeline</div></div>
    <div class="item"><img src="database.svg" alt="database" /><div class="name">database</div></div>
    <div class="item"><img src="devops.svg" alt="devops" /><div class="name">devops</div></div>
    <div class="item"><img src="innovation.svg" alt="innovation" /><div class="name">innovation</div></div>
    <div class="item"><img src="integration.svg" alt="integration" /><div class="name">integration</div></div>
    <div class="item"><img src="network.svg" alt="network" /><div class="name">network</div></div>
    <div class="item"><img src="performance.svg" alt="performance" /><div class="name">performance</div></div>
    <div class="item"><img src="platform.svg" alt="platform" /><div class="name">platform</div></div>
    <div class="item"><img src="reliability.svg" alt="reliability" /><div class="name">reliability</div></div>
    <div class="item"><img src="security.svg" alt="security" /><div class="name">security</div></div>
    <div class="item"><img src="settings.svg" alt="settings" /><div class="name">settings</div></div>
    <div class="item"><img src="speed.svg" alt="speed" /><div class="name">speed</div></div>
    <div class="item"><img src="strategy.svg" alt="strategy" /><div class="name">strategy</div></div>
    <div class="item"><img src="support.svg" alt="support" /><div class="name">support</div></div>
    <div class="item"><img src="team.svg" alt="team" /><div class="name">team</div></div>
    <div class="item"><img src="uptime.svg" alt="uptime" /><div class="name">uptime</div></div>
  </div>
</body>
</html>
