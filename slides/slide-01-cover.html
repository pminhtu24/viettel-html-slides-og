<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÁO CÁO TỔNG KẾT HOẠT ĐỘNG KINH DOANH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/slide-viettel-theme.css">
</head>
<body class="min-h-screen slide-16x9">
    <div class="slide-shell tech-shell">
        <div class="slide-content">
            <header class="slide-header animate-fade-left">
                <h1 class="slide-title">BÁO CÁO TỔNG KẾT HOẠT ĐỘNG KINH DOANH</h1>
                <p class="slide-subtitle">Viettel Telecom — Quý I/2026</p>
            </header>

            <main class="slide-main">
                <div class="layout-text-only animate-fade-up">
    <div class="overview-card">
        <p class="eyebrow">Tập đoàn Công nghiệp – Viễn thông Quân đội</p>
        <h2 class="overview-title">BÁO CÁO TỔNG KẾT HOẠT ĐỘNG KINH DOANH</h2>
        <p class="overview-copy">{{copy}}</p>
    </div>
    <div class="text-only-content soft-panel delay-1">
        <p style='font-size: 1.1rem; line-height: 1.8; color: #333;'>Tổng kết kết quả kinh doanh, đầu tư hạ tầng và chiến lược phát triển mạng lưới viễn thông toàn quốc.</p>
    </div>
</div>

            </main>
        </div>

        <img src="./assets/viettel-logo.png" alt="Viettel logo" class="brand-logo">
    </div>

<script>
  window.addEventListener("keydown", (event) => {
    if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
      window.parent.postMessage({
        type: "deck-navigation",
        direction: event.key === "ArrowLeft" ? "left" : "right"
      }, "*");
    }
  });
</script>

</body>
</html>
