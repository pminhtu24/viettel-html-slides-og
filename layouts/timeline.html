<div class="layout-timeline animate-fade-up">
    {{#each events}}
    <div class="timeline-item">
        <div class="timeline-marker"></div>
        <p class="timeline-date">{{date}}</p>
        <div class="timeline-content">
            <h4 class="feature-title" style="margin-top:0">{{title}}</h4>
            <p class="feature-copy">{{copy}}</p>
        </div>
    </div>
    {{/each}}
</div>
