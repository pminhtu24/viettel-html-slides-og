<div class="layout-image-text-split">
    <div class="image-side animate-fade-left">
        <img src="{{image_src}}" alt="{{image_alt}}" class="soft-panel {{image_readability_class}}">
    </div>
    <div class="text-side animate-fade-up delay-1">
        <div class="overview-card">
            <p class="eyebrow">{{eyebrow}}</p>
            <h2 class="overview-title">{{title}}</h2>
            <p class="overview-copy">{{copy}}</p>
        </div>
        <div class="feature-card soft-panel">
            <p class="feature-copy">{{additional_text}}</p>
        </div>
    </div>
</div>
