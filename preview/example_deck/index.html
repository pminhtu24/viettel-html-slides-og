<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deck: Báo cáo nguy cơ ATTT Việt Nam Q3/2025</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      overflow: hidden;
    }
    .deck-shell {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: #ffffff;
    }
    #deck-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }
    .deck-control {
      position: fixed;
      right: 24px;
      bottom: 16px;
      z-index: 50;
      pointer-events: none;
    }
    #deck-status {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.9);
      padding: 6px 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="deck-shell">
    <iframe id="deck-frame" title="Báo cáo nguy cơ ATTT Việt Nam Q3/2025"></iframe>
    <div class="deck-control">
      <span id="deck-status">01 / 18</span>
    </div>
  </div>

  <script>
    const slides = [
      "./slide-01-section-divider.html",
      "./slide-02-agenda.html",
      "./slide-03-highlight.html",
      "./slide-04-chart-analysis.html",
      "./slide-05-section-divider.html",
      "./slide-06-bar-insight.html",
      "./slide-07-data-table.html",
      "./slide-08-chart-pie.html",
      "./slide-09-section-divider.html",
      "./slide-10-comparison.html",
      "./slide-11-kpi-grid.html",
      "./slide-12-chart-pie.html",
      "./slide-13-section-divider.html",
      "./slide-14-chart-analysis.html",
      "./slide-15-bar-insight.html",
      "./slide-16-appendix-technical.html",
      "./slide-17-gantt.html",
      "./slide-18-text-only.html"
    ];

    let currentIndex = 0;
    const frame = document.getElementById("deck-frame");
    const status = document.getElementById("deck-status");
    const pad = (n) => String(n).padStart(2, "0");

    function renderSlide(index) {
      currentIndex = Math.max(0, Math.min(index, slides.length - 1));
      frame.src = slides[currentIndex];
      status.textContent = `${pad(currentIndex + 1)} / ${pad(slides.length)}`;
    }

    function goNext() { renderSlide(currentIndex + 1); }
    function goPrev() { renderSlide(currentIndex - 1); }

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") goNext();
      if (event.key === "ArrowLeft") goPrev();
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "deck-navigation") return;
      if (data.direction === "right") goNext();
      if (data.direction === "left") goPrev();
    });

    renderSlide(0);
  </script>
</body>
</html>
