<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Viettel Icon Library</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;padding:2rem}
h1{font-size:1.5rem;font-weight:700;color:#111;margin-bottom:.25rem}
.meta{font-size:.85rem;color:#666;margin-bottom:2rem}
.search-row{display:flex;gap:1rem;align-items:center;margin-bottom:2rem}
.search{padding:.5rem 1rem;border:1px solid #ddd;border-radius:6px;font-size:.9rem;width:320px;outline:none}
.search:focus{border-color:#E4002B}
.badge{background:#E4002B;color:#fff;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:20px}
.cat-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#999;margin:2rem 0 .75rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px}
.icon-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;background:#fff;border:1px solid #eee;border-radius:10px;cursor:pointer;transition:all .15s;user-select:none}
.icon-item:hover{border-color:#E4002B;transform:translateY(-2px);box-shadow:0 4px 14px rgba(228,0,43,.15)}
.icon-item:active{transform:scale(.97)}
.icon-item.copied{background:#fff0f3;border-color:#E4002B}
.icon-item img{width:48px;height:48px;display:block}
.icon-name{font-size:.6rem;color:#888;text-align:center;line-height:1.3;font-family:monospace;word-break:break-all}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:.5rem 1.2rem;border-radius:6px;font-size:.85rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.hidden{display:none!important}
</style>
</head>

function buildAll() {
  const container = document.getElementById('all');
  let total = 0;
  for (const [cat, items] of Object.entries(icons)) {
    const h = document.createElement('div');
    h.className = 'cat-title';
    h.textContent = cat;
    container.appendChild(h);

    const grid = document.createElement('div');
    grid.className = 'grid';

    for (const [slug, label] of items) {
      const el = document.createElement('div');
      el.className = 'icon-item';
      el.dataset.slug = slug;
      el.dataset.label = String(label).toLowerCase();
      el.dataset.cat = String(cat).toLowerCase();

      const img = document.createElement('img');
      img.src = iconDataBySlug[slug] || '';
      img.alt = label;
      img.loading = 'lazy';

      const name = document.createElement('div');
      name.className = 'icon-name';
      name.textContent = slug;

      el.appendChild(img);
      el.appendChild(name);
      el.onclick = () => copy(slug, el);
      grid.appendChild(el);
      total++;
    }

    container.appendChild(grid);
  }
  document.getElementById('cnt').textContent = total + ' icons';
}

function copy(slug, el) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(slug).catch(() => {});
  }
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 700);

  const t = document.getElementById('toast');
  t.textContent = 'Copied: ' + slug;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1600);
}

function filter(q) {
  const term = String(q).toLowerCase().trim();
  let vis = 0;

  document.querySelectorAll('.icon-item').forEach(el => {
    const match = !term || el.dataset.slug.includes(term) || el.dataset.label.includes(term) || el.dataset.cat.includes(term);
    el.classList.toggle('hidden', !match);
    if (match) vis++;
  });

  document.getElementById('cnt').textContent = vis + ' icons';

  document.querySelectorAll('.grid').forEach(g => {
    const hasVis = [...g.querySelectorAll('.icon-item')].some(i => !i.classList.contains('hidden'));
    g.previousElementSibling.style.display = hasVis ? '' : 'none';
    g.style.display = hasVis ? '' : 'none';
  });
}

buildAll();
</script>
